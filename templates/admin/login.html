<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Sabula Shoe Point</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1c23 0%,#0f1117 100%);font-family:'Poppins',sans-serif; }
    .admin-login { background:rgba(255,255,255,0.35);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);padding:40px;border-radius:var(--radius-xl);box-shadow:0 24px 64px rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.1);border:1px solid var(--glass-border);width:400px;max-width:90%; }
    .admin-login h1 { text-align:center;margin-bottom:24px;font-size:1.6rem; }
    .admin-login .logo { justify-content:center;margin-bottom:24px; }
  </style>
</head>
<body>
  <div class="admin-login">
    <a href="{{ url_for('home') }}" class="logo">
      <i class="fas fa-shoe-prints logo-icon"></i>
      <span class="logo-text" style="color:var(--text);">Sabula <span class="logo-highlight">Admin</span></span>
    </a>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-alert flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="admin" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="admin123" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Login</button>
      <p style="text-align:center;margin-top:10px;font-size:0.82rem;">
        <a href="{{ url_for('admin_forgot_password') }}" style="color:var(--text-light);">Forgot Password?</a>
      </p>
      <p style="text-align:center;margin-top:6px;font-size:0.82rem;color:var(--text-light);">
        <a href="{{ url_for('home') }}" style="color:var(--accent);">← Back to Store</a>
      </p>
    </form>
  </div>
</body>
</html>
